pipeline:
  name: FullStack-Cd-Pipeline
  identifier: FullStackCdPipeline
  projectIdentifier: TEST
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: deploy_full_stack_application
        identifier: deploy_full_stack_application
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: fullstack_services
          environment:
            environmentRef: newenvforfullstack
            deployToAll: false
            infrastructureDefinitions:
              - identifier: harness_k8s_infra
          execution:
            steps:
              - step:
                  name: Rollout Deployment
                  identifier: rolloutDeployment
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  name: Rollback Rollout Deployment
                  identifier: rollbackRolloutDeployment
                  type: K8sRollingRollback
                  timeout: 10m
                  spec:
                    pruningEnabled: false
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
  notificationRules:
    - name: pipeline-status
      identifier: pipelinestatus
      pipelineEvents:
        - type: PipelineSuccess
        - type: TriggerFailed
      notificationMethod:
        type: Email
        spec:
          userGroups: []
          recipients:
            - sai.battu@atyeti.com
      enabled: true
