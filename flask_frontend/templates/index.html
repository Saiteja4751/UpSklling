<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Portal</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(-45deg,#1e3c72,#2a5298,#6dd5ed,#2193b0);
            background-size:400% 400%;
            animation:bgAnimation 12s ease infinite;
            overflow:hidden;
        }

        @keyframes bgAnimation{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .container{
            width:420px;
            padding:35px;
            border-radius:25px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border:1px solid rgba(255,255,255,0.2);
            box-shadow:0 8px 32px rgba(0,0,0,0.25);
            animation:fadeIn 1s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        h2{
            text-align:center;
            color:white;
            margin-bottom:25px;
            font-size:32px;
        }

        .subtitle{
            text-align:center;
            color:#eaeaea;
            margin-bottom:25px;
            font-size:14px;
        }

        label{
            color:white;
            font-weight:600;
            margin-bottom:8px;
            display:block;
        }

        input,
        textarea{
            width:100%;
            padding:14px;
            border:none;
            outline:none;
            border-radius:12px;
            margin-bottom:20px;
            background:rgba(255,255,255,0.2);
            color:white;
            font-size:15px;
            transition:0.3s;
        }

        input::placeholder,
        textarea::placeholder{
            color:#eee;
        }

        input:focus,
        textarea:focus{
            background:rgba(255,255,255,0.3);
            transform:scale(1.02);
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:white;
            color:#1e3c72;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }

        .btn:hover{
            transform:translateY(-3px);
            background:#f1f1f1;
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
        }

        .view-btn{
            margin-top:15px;
            background:transparent;
            border:2px solid white;
            color:white;
        }

        .view-btn:hover{
            background:white;
            color:#1e3c72;
        }

        .footer{
            text-align:center;
            margin-top:20px;
            color:white;
            font-size:13px;
        }

    </style>

    <script>
        function showPopup(event){
            event.preventDefault();
            alert("✅ Thank you! Feedback submitted successfully.");
            event.target.submit();
        }
    </script>

</head>

<body>

<div class="container">

    <h2>Feedback Portal</h2>

    <p class="subtitle">
        Share your valuable feedback with us 🚀
    </p>

    <form method="POST" onsubmit="showPopup(event)">

        <label>Name</label>
        <input type="text" name="name" placeholder="Enter your name" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email" required>

        <label>Message</label>
        <textarea name="message" rows="4" placeholder="Write your feedback..." required></textarea>

        <button class="btn" type="submit">
            Submit Feedback
        </button>

    </form>

    <form action="/view-feedback" method="GET">
        <button class="btn view-btn" type="submit">
            View Submitted Feedback
        </button>
    </form>

    <div class="footer">
        Designed with ❤️ using Flask + FastAPI + Kubernetes
    </div>

</div>

</body>
</html>
