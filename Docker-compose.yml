version: "3.9"

services:

  mysql-db:
    image: mysql:8.0
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: feedback_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  fastapi-backend:
    build: ./fastapi_backend
    container_name: fastapi-container
    restart: always
    depends_on:
      - mysql-db
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql-db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: feedback_db

  flask-frontend:
    build: ./flask_frontend
    container_name: flask-container
    restart: always
    depends_on:
      - fastapi-backend
    ports:
      - "5000:5000"

volumes:
  mysql_data: